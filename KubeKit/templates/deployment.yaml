{{- $root := . -}}
{{- $deployments := .Values.deployments -}}
{{- if not $deployments -}}
  {{- $deployments = list (dict "name" "" "isDefault" true) -}}
{{- end -}}

{{- range $idx, $dep := $deployments }}
{{- if $idx }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "KubeKit.fullname" $root }}{{ if $dep.name }}-{{ $dep.name }}{{ end }}
  labels:
    {{- include "KubeKit.labels" $root | nindent 4 }}
    {{- with $dep.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not $root.Values.autoscaling.enabled }}
  replicas: {{ default $root.Values.replicaCount $dep.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml $root.Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "KubeKit.selectorLabels" $root | nindent 6 }} {{/* 3. Use $root instead of . */}}
      app.kubernetes.io/component: {{ $dep.name }}
  template:
    metadata:
      {{- if or $root.Values.podAnnotations $dep.podAnnotations }}
      annotations:
        {{- with $root.Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{ end }}
        {{- with $dep.podAnnotations }}{{ toYaml . | nindent 8 }}{{ end }}
      {{- end }}
      labels:
        {{- include "KubeKit.labels" $root | nindent 8 }}
        {{- include "KubeKit.selectorLabels" $root | nindent 8 }} {{/* FIXED: Changed . to $root */}}
        {{- with $root.Values.podLabels }}{{ toYaml . | nindent 8 }}{{ end }}
        {{- with $dep.podLabels }}{{ toYaml . | nindent 8 }}{{ end }}
        app.kubernetes.io/component: {{ $dep.name | default "global" }}
    spec:
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ default (include "KubeKit.serviceAccountName" $root) $dep.serviceAccountName }}
      
      {{- if $root.Values.podSecurityContext }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      {{- end }}
      
      containers:
        - name: {{ $dep.name | default $root.Chart.Name }}
          {{- if $root.Values.securityContext }}
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}
          {{- end }}
          
          {{- $repo := $root.Values.image.repository -}}
          {{- if and $dep.image $dep.image.repository }}{{ $repo = $dep.image.repository }}{{ end -}}
          {{- $tag := default $root.Chart.AppVersion $root.Values.image.tag -}}
          {{- if and $dep.image $dep.image.tag }}{{ $tag = $dep.image.tag }}{{ end }}
          image: "{{ $repo }}:{{ $tag }}"
          imagePullPolicy: {{ if and $dep.image $dep.image.pullPolicy }}{{ $dep.image.pullPolicy }}{{ else }}{{ $root.Values.image.pullPolicy }}{{ end }}
          
          {{- $cmd := default $root.Values.command $dep.command }}
          {{- if $cmd }}
          command:
            {{- toYaml $cmd | nindent 12 }}
          {{- end }}

          {{- $envList := $root.Values.env -}}
          {{- if and $dep.env $dep.env.merge }}
            {{- $envList = concat $root.Values.env $dep.env -}}
          {{- else if $dep.env }}
            {{- $envList = $dep.env -}}
          {{- end }}
          {{- if $envList }}
          env:
            {{- toYaml $envList | nindent 12 }}
          {{- end }}

          {{- $hasCM := or $root.Values.configmap.enabled (and $dep.configmap $dep.configmap.enabled) -}}
          {{- $hasSecrets := or $root.Values.secretRefs.enabled (and $dep.secretRefs $dep.secretRefs.enabled) -}}
          {{- if or $hasCM $hasSecrets }}
          envFrom:
            {{- if $hasCM }}
            - configMapRef:
                name: {{ include "KubeKit.fullname" $root }}{{ if $dep.name }}-{{ $dep.name }}{{ end }}-cm
            {{- end }}
            {{- $secrets := list -}}
            {{- if and $dep.secretRefs $dep.secretRefs.merge }}
              {{- $secrets = concat $root.Values.secretRefs.secrets (default list $dep.secretRefs.secrets) -}}
            {{- else if and $dep.secretRefs $dep.secretRefs.enabled }}
              {{- $secrets = $dep.secretRefs.secrets -}}
            {{- else }}
              {{- $secrets = $root.Values.secretRefs.secrets -}}
            {{- end }}
            {{- range $secrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}

          ports:
            {{- $ports := $root.Values.services.service -}}
            {{- if and $dep.services $dep.services.merge }}
              {{- $ports = concat $root.Values.services.service $dep.services.service -}}
            {{- else if and $dep.services $dep.services.service }}
              {{- $ports = $dep.services.service -}}
            {{- end }}
            {{- range $ports }}
            - name: {{ .name | default "http" }}
              containerPort: {{ .port }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}

{{- range $p := list "livenessProbe" "readinessProbe" }}
          {{- $globalP := index $root.Values $p | default dict -}}
          {{- $depP := index $dep $p | default dict -}}
          {{- if or (and $globalP (index $globalP "enabled")) (and $depP (index $depP "enabled")) }}
          {{ $p }}:
            httpGet:
              path: {{ if and $depP $depP.endpoint }}{{ $depP.endpoint }}{{ else }}{{ $globalP.endpoint }}{{ end }}
              port: {{ if and $depP $depP.port }}{{ $depP.port }}{{ else }}{{ $globalP.port }}{{ end }}
            initialDelaySeconds: {{ if and $depP $depP.initialDelaySeconds }}{{ $depP.initialDelaySeconds }}{{ else }}{{ $globalP.initialDelaySeconds }}{{ end }}
            periodSeconds: {{ if and $depP $depP.periodSeconds }}{{ $depP.periodSeconds }}{{ else }}{{ $globalP.periodSeconds }}{{ end }}
            {{- if or (and $globalP $globalP.timeoutSeconds) (and $depP $depP.timeoutSeconds) }}
            timeoutSeconds: {{ if and $depP $depP.timeoutSeconds }}{{ $depP.timeoutSeconds }}{{ else }}{{ $globalP.timeoutSeconds }}{{ end }}
            {{- end }}
            {{- if or (and $globalP $globalP.successThreshold) (and $depP $depP.successThreshold) }}
            successThreshold: {{ if and $depP $depP.successThreshold }}{{ $depP.successThreshold }}{{ else }}{{ $globalP.successThreshold }}{{ end }}
            {{- end }}
            {{- if or (and $globalP $globalP.failureThreshold) (and $depP $depP.failureThreshold) }}
            failureThreshold: {{ if and $depP $depP.failureThreshold }}{{ $depP.failureThreshold }}{{ else }}{{ $globalP.failureThreshold }}{{ end }}
            {{- end }}
          {{- end }}
          {{- end }}
          {{- $res := default $root.Values.resources $dep.resources }}
          {{- if $res }}
          resources:
            {{- toYaml $res | nindent 12 }}
          {{- end }}

          {{- if or $root.Values.persistence.enabled (and $dep.persistence $dep.persistence.enabled) }}
          volumeMounts:
            {{- $vols := $root.Values.persistence.volumes -}}
            {{- if and $dep.persistence $dep.persistence.merge }}
              {{- $vols = concat $root.Values.persistence.volumes $dep.persistence.volumes -}}
            {{- else if and $dep.persistence $dep.persistence.volumes }}
              {{- $vols = $dep.persistence.volumes -}}
            {{- end }}
            {{- range $vols }}
            - name: {{ include "KubeKit.fullname" $root }}-{{ $dep.name | default "global" }}-{{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          {{- end }}

      {{- if or $root.Values.persistence.enabled (and $dep.persistence $dep.persistence.enabled) }}
      volumes:
        {{- $vols := $root.Values.persistence.volumes -}}
        {{- if and $dep.persistence $dep.persistence.merge }}
          {{- $vols = concat $root.Values.persistence.volumes $dep.persistence.volumes -}}
        {{- else if and $dep.persistence $dep.persistence.volumes }}
          {{- $vols = $dep.persistence.volumes -}}
        {{- end }}
        {{- range $vols }}
        - name: {{ include "KubeKit.fullname" $root }}-{{ $dep.name | default "global" }}-{{ .name }}
          persistentVolumeClaim:
            claimName: {{ include "KubeKit.fullname" $root }}-{{ $dep.name | default "global" }}-{{ .name }}-pvc
        {{- end }}
      {{- end }}

      {{- $ns := default $root.Values.nodeSelector $dep.nodeSelector }}
      {{- if $ns }}
      nodeSelector:
        {{- toYaml $ns | nindent 8 }}
      {{- end }}
      
      {{- $aff := default $root.Values.affinity $dep.affinity }}
      {{- if $aff }}
      affinity:
        {{- toYaml $aff | nindent 8 }}
      {{- end }}
      
      {{- $tol := default $root.Values.tolerations $dep.tolerations }}
      {{- if $tol }}
      tolerations:
        {{- toYaml $tol | nindent 8 }}
      {{- end }}
{{- end }}