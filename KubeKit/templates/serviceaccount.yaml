{{- $root := . -}}
{{- $deployments := .Values.deployments -}}
{{- if not $deployments -}}
  {{- $deployments = list (dict "name" "" "isDefault" true) -}}
{{- end -}}

{{- range $idx, $dep := $deployments }}
  {{- $saCreate := false -}}
  {{- $saVals := dict -}}
  {{- if and $dep.serviceAccount (hasKey $dep.serviceAccount "create") }}
    {{- $saCreate = $dep.serviceAccount.create -}}
    {{- $saVals = $dep.serviceAccount -}}
  {{- else if $root.Values.serviceAccount.create }}
    {{- $saCreate = true -}}
    {{- $saVals = $root.Values.serviceAccount -}}
  {{- end }}

  {{- if $saCreate }}
{{- if $idx }}---{{ end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (printf "%s-%s" (include "KubeKit.fullname" $root) ($dep.name | default "sa")) $saVals.name }}
  labels:
    {{- include "KubeKit.labels" $root | nindent 4 }}
  {{- with $saVals.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ default $root.Values.serviceAccount.automount $saVals.automount }}
  {{- end }}
{{- end }}