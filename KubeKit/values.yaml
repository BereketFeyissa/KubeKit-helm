# Default values for KubeKit.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
command: []
  # Optional command to override the default container entrypoint
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: 
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # capabilities:
  #   drop:
  #   - ALL

services:
  type: ClusterIP
  service:
  - name: http
    port: 80
    protocol: TCP
  #   serviceName: ""
  # - name: https
  #   port: 443
  #   protocol: TCP
  #   serviceName: great

configmap:
  enabled: false
  configs: {}
    # key: value

# Global env vars for containers (list of { name:, value: } objects)
env: []

# Per-field merge hints:
# - deployments[].services.merge: if true, global `services.service` values are
#   included before per-deployment `services.service` entries.
# - deployments[].persistence.merge: if true, global `persistence.volumes` are
#   included before per-deployment `persistence.volumes` entries.
# - deployments[].env.merge: if true, global `env` entries are included before
#   per-deployment `env` entries.
# - deployments[].configmap.merge: if true, global `configmap.configs` are
#   included before per-deployment `configmap.configs` when rendering per-dep
#   ConfigMaps.

secretRefs:
  enabled: false
  secrets: []
    # - secret
    # - another-secret
  # If `merge: true` is set under a deployment's `secretRefs`, that deployment
  # will include the global `secretRefs.secrets` in addition to its own.
  # Example per-deployment usage:
  # deployments:
  #   - name: worker
  #     secretRefs:
  #       enabled: true
  #       merge: true
  #       secrets:
  #         - my-worker-secret

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

livenessProbe:
  enabled: false
  endpoint: /
  port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 2
  failureThreshold: 2

readinessProbe:
  enabled: false
  endpoint: /
  port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 2
  failureThreshold: 2

persistence:
  enabled: false
  volumes: []
    # - name: data
    #   accessMode: ReadWriteOnce
    #   size: 10Gi
    #   storageClass: ""
    #   mountPath: /data
    #   annotations: {}
    # - name: logs
    #   accessMode: ReadWriteOnce
    #   size: 5Gi
    #   storageClass: ""
    #   mountPath: /logs
    #   annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Optional: define multiple deployments. If omitted, chart renders a single deployment
# using the top-level image/replicaCount values. Each entry must provide `name`.
deployments: []
# Example per-deployment overrides (all fields optional except `name`):
